layout:
  qmk_keyboard: boardsource/unicorne
  layout_name: LAYOUT_split_3x6_3
## Let's pretend this is a 3x5 split, and see what we can cram in
layers:
  ## BASE LAYERS
  Base:
    - [
        Compose,
        { t: "'", s: '"' },
        { t: ",", s: "<" },
        { t: ".", s: ">" },
        P,
        Y,
        F,
        G,
        C,
        R,
        L,
        Repeat Alt,
      ]
    - [
        Leader,
        { h: LAlt, t: A },
        { h: LGUI, t: O },
        { h: LCtrl, t: E },
        { h: LShift, t: U },
        I,
        D,
        { h: RShift, t: H },
        { h: RCtrl, t: T },
        { h: RGUI, t: N },
        { h: RAlt, t: S },
        Repeat,
      ]
    - [null, { t: ":", s: ";" }, Q, J, K, X, B, M, W, V, Z, null]
    - [
        { h: Function, t: Delete },
        { h: Number, t: Backspace },
        { h: Mouse, t: Esc },
        { h: Symbol, t: Enter },
        { h: Nav, t: Space },
        { h: Media, t: Tab },
      ]
  ### SHIFT LAYERS
  Number: ## Activation key is a dual-mode, hold for momentary, double-tap to toggle on
    - [Reboot, null, Toggle GUI, null, null, Toggle NKRO, C, 7, 8, 9, D, Tab]
    - [null, Alt, GUI, Ctrl, Shift, Caps Lock, B, 4, 5, 6, E, Backspace]
    - [
        Drop Toggles,
        Toggle Button,
        null,
        Toggle Nav,
        Layer Lock,
        null,
        A,
        1,
        2,
        3,
        F,
        Enter,
      ]
    - [null, { type: held }, null, ":", 0, "."]
  Nav:
    - [
        null,
        Page Up,
        Home,
        Up,
        End,
        Insert,
        null,
        null,
        null,
        null,
        null,
        Reboot,
      ]
    - [
        null,
        Page Dn,
        Left,
        Down,
        Right,
        Caps Word,
        null,
        Shift,
        Ctrl,
        GUI,
        Alt,
        null,
      ]
    - [
        null,
        Undo,
        Cut,
        Copy,
        Paste,
        Clip Hist,
        null,
        Layer Lock,
        Toggle Number,
        null,
        Toggle Button,
        Drop Toggles,
      ]
    - [Delete, Backspace, Enter, null, { type: held }, null]
  Symbol: ## breaks the usual rules regarding same-hand chords to accomodate more symbols. still looking to avoid awkward gyrations
    - [
        Compose,
        { t: "'", s: '"' },
        '\',
        "+",
        "/",
        "+",
        "&",
        "[",
        "%",
        "]",
        "!",
        Alt Repeat,
      ]
    - [
        Leader,
        { h: Alt, t: "^" },
        { h: GUI, t: "=" },
        { h: Ctrl, t: "-" },
        { h: Shift, t: "$" },
        "*",
        "#",
        { h: Shift, t: "(" },
        { h: Ctrl, t: ";" },
        { h: GUI, t: ")" },
        { h: Alt, t: "?" },
        Repeat,
      ]
    - [null, "<", "|", "_", ">", "../", "~", "{", "$", "}", "`", null]
    - [null, null, ".", { type: held }, "@", null]
  Mouse:
    - [
        null,
        null,
        null,
        null,
        null,
        null,
        Scroll Up,
        Scroll Left,
        Mouse Up,
        Scroll Right,
        null,
        Reboot,
      ]
    - [
        null,
        Alt,
        GUI,
        Ctrl,
        Shift,
        null,
        Scroll Down,
        Mouse Left,
        Mouse Down,
        Mouse Right,
        null,
        null,
      ]
    - [
        Drop Toggles,
        null,
        null,
        Toggle Symbol,
        Layer Lock,
        null,
        null,
        null,
        null,
        null,
        Toggle Button,
        Drop Toggles,
      ]
    - [null, null, { type: held }, Mouse2, Mouse1, Mouse3]
  Function:
    - [Reboot, null, null, null, null, null, PrtScn SysRq, F1, F2, F3, F4, F5]
    - [null, Alt, GUI, Ctrl, Shift, null, Scroll Lock, F6, F7, F8, F9, F10]
    - [
        Drop Toggles,
        Toggle Button,
        null,
        Toggle Media,
        Layer Lock,
        null,
        Pause Break,
        F11,
        F12,
        F13,
        F14,
        F15,
      ]
    - [{ type: held }, null, null, Tab, Space, Menu]
  Media:
    - [
        null,
        Bright +,
        Rewind,
        Vol Up,
        Fast Fwd,
        null,
        RGB Bright +,
        RGB Hue +,
        RGB Sat +,
        RGB Val +,
        RGB Speed +,
        RGB Mode +,
      ]
    - [
        null,
        Bright -,
        Skip Back,
        Vol Dn,
        Skip Fwd,
        null,
        RGB Bright -,
        RGB Hue -,
        RGB Sat -,
        RGB Val -,
        RGB Speed -,
        RGB Tog,
      ]
    - [
        null,
        null,
        null,
        null,
        null,
        null,
        null,
        Layer Lock,
        Toggle Function,
        null,
        Toggle Button,
        Drop Toggles,
      ]
    - [Mute, Play/Pause, Stop, null, null, { type: held }]
  Button:
    - [
        null,
        Undo,
        Cut,
        Copy,
        Paste,
        Clip Hist,
        NumLock,
        Num7,
        Num8,
        Num9,
        Num*,
        Num/,
      ]
    - [null, Alt, GUI, Ctrl, Shift, null, null, Num4, Num5, Num6, Num-, Num=]
    - [
        Drop Toggles,
        Undo,
        Cut,
        Copy,
        Paste,
        Clip Hist,
        null,
        Num1,
        Num2,
        Num3,
        Num+,
        NumEnt,
      ]
    - [Mouse3, Mouse1, Mouse2, ":", Num0, Num.]
