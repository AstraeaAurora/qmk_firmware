layout:
  qmk_keyboard: boardsource/unicorne
  layout_name: LAYOUT_split_3x6_3
## Let's pretend this is a 3x5 split, and see what we can cram in
layers:
  ## BASE LAYERS
  Base_Dvorak:
    - [null, "'", ',', '.', P, Y, F, G, C, R, L, Repeat]
    - [null, {h: Alt, t: A}, {h: Super, t: O}, {h: Ctrl, t: E}, {h: Shift, t: U}, I, D, {h: Shift, t: H}, {h: Ctrl, t: T}, {h: Super, t: N}, {h: Alt, t: S}, null]
    - [null, ':', Q, J, K, X, B, M, W, V, Z, null]
    - [{h: Function, t: Delete}, {h: Number, t: Backspace}, {h: Symbol, t: Enter}, {h: Mouse, t: Tab}, {h: Nav, t: Space}, {t: Esc, h: Media}]
  Extra_magicsturdy:
    - [null, V, M, L, C, P, B, Magic, U, O, Q, Repeat]
    - [null, {h: Alt, t: S}, {h: Super, t: T}, {h: Ctrl, t: R}, {h: Shift, t: D}, Y, F, {h: Shift, t: N}, {h: Ctrl, t: E}, {h: Super, t: A}, {h: Alt, t: I}, null]
    - [null, X, K, J, G, W, Z, H, ",", ".", ":", null]
    - [{h: Function, t: Delete}, {h: Number, t: Backspace}, {h: Symbol, t: Enter}, {h: Mouse, t: Tab}, {h: Nav, t: Space}, {t: Esc, h: Media}]
  Tap_QWERTY: ## Tap-only layer, for games where home-row mods would cause problems. Leaving on QWERTY to minimize friction
    - [Alt, Q, W, E, R, T, Y, U, I, O, P, Super]
    - [Ctrl, A, S, D, F, G, H, J, K, L, ;, Ctrl]
    - [Shift, Z, X, C, V, B, N, M, "'", '.', '/', Shift]
    - [{h: Function, t: Delete}, {h: Number, t: Backspace}, {h: Symbol, t: Enter}, {h: Mouse, t: Tab}, {h: Nav, t: Space}, {t: Esc, h: Media}]
  ### SHIFT LAYERS
  Number: ## Activation key is a dual-mode, hold for momentary, double-tap to toggle on
    - [Boot, null, Tap, Extra, Base, null, C, 7, 8, 9, D, null]
    - [null, Alt, Super, Ctrl, Shift, null, B, 4, 5, 6, E, null]
    - [Drop Toggles, Button, null, LL Nav, LL Number, null, A, 1, 2, 3, F, Drop Toggles]
    - [null, {type: held}, null, ':', 0, '.']
  Symbol: ## breaks the usual rules regarding same-hand chords to accomodate more symbols. still looking to avoid awkward gyrations
    - [null, null, '\', '+', '/', '+', '&', '[', '%', ']', '!', Repeat]
    - [null, {h: Alt, t: '^'}, {h: Super, t: '='}, {h: Ctrl, t: '-'}, {h: Shift, t: '$'}, '*', '#', {h: Shift, t: '('}, {h: Ctrl, t: ";"}, {h: Super, t: ')'}, {h: Alt, t: '?'}, null]
    - [Drop Toggles, '<', '|', '_', '>', '../', '~', '{', '$', '}', '`', Drop Toggles]
    - [null, null, {type: held}, '.', '@', null]
  Nav:
    - [null, Page Up, Home, Up, End, Insert, System, Base, Extra, Tap, null, Boot]
    - [null, Page Dn, Left, Down, Right, Caps Word, null, Shift, Ctrl, Super, Alt, null]
    - [Drop Toggles, Undo, Cut, Copy, Paste, Clip Hist, null, LL Nav, LL Number, null, Button, Drop Toggles]
    - [Delete, Backspace, Enter, null, {type: held}, null,]
  Function:
    - [Boot, null, Tap, Extra, Base, null, PrtScn SysRq, F7, F8, F9, F12, F14]
    - [null, Alt, Super, Ctrl, Shift, null, Scroll Lock, F4, F5, F6, F11, F13]
    - [Drop Toggles, Button, null, LL Media, LL Function, null, Pause Break, F1, F2, F3, F10, Drop Toggles]
    - [{type: held}, null, null, Tab, Space, Menu]
  Mouse:
    - [null, null, Scroll Left, Mouse Up, Scroll Right, Scroll Up, System, Base, Extra, Tap, null, Boot]
    - [null, null, Mouse Left, Mouse Down, Mouse Right, Scroll Down, null, Shift, Ctrl, Super, Alt, null]
    - [Drop Toggles, null, null, null, null, null, null, null, LL Symbol, LL Mouse, null, Drop Toggles]
    - [Mouse3, Mouse1, Mouse2, {type: held}, null, null]
  Media:
    - [null, RGB Hue, RGB Sat, Vol Up, RGB Val, RGB Tog, System, Base, Extra, Tap, null, Boot]
    - [null, null, Skip Back, Vol Dn, Skip Fwd, null, null, null, null, null, null, null]
    - [Drop Toggles, null, null, null, null, null, null, LL Media, LL Function, null, null, Drop Toggles]
    - [Mute, Play/Pause, Stop, null, null, {type: held}]
  Button:
    - [null, null, null, null, null, null, null, null, null, null, null, null]
    - [null, null, null, null, null, null, null, null, null, null, null, null]
    - [Drop Toggles, null, null, null, null, null, null, null, null, null, null, Drop Toggles]
    - [null, null, null, null, null, null]
  Numpad:
    - [null, null, null, null, null, null, NumLock, Num7, Num8, Num9, Num*, Num/]
    - [null, null, null, null, null, null, null, Num4, Num5, Num6, Num-, null]
    - [Drop Toggles, null, null, null, null, null, null, Num1, Num2, Num3, Num+, Drop Toggles]
    - [null, null, null, ":", Num0, "."]
